# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "98eccc305b95a11d2b9dbec18a0681d1"
name = "JudgeMe Reviews"
handle = "judgeme-reviews"
application_url = "https://judge-me-sigma.vercel.app"
embedded = true

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app/subscriptions_update"

  [[webhooks.subscriptions]]
  topics = [ "products/create", "products/update", "products/delete" ]
  uri = "/webhooks/products"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,read_products,read_themes,write_customers,write_themes"

[auth]
redirect_urls = [
  "https://judge-me-sigma.vercel.app/auth/callback",
  "https://judge-me-sigma.vercel.app/auth/shopify/callback",
  "https://judge-me-sigma.vercel.app/api/auth/callback",
]

[pos]
embedded = true

[build]
# When false, dev tunnels can disagree with `application_url` → App Bridge postMessage / nav issues in the admin iframe.
automatically_update_urls_on_dev = true

[app_proxy]
url = "https://judge-me-sigma.vercel.app"
subpath = "judgeme-reviews"
prefix = "apps"
